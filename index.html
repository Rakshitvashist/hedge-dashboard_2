<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOM Institutional Terminal | Hedge Portfolio Analytics</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="particles-js"></div>

  <main class="app-container">
    <!-- HEADER -->
    <header class="header animate-in">
      <div>
        <h1 class="brand-title">SOM Institutional Terminal</h1>
        <p id="last-refresh" class="text-muted mono" style="font-size: 0.75rem; margin-top: 0.5rem;"></p>
      </div>
      <div class="header-actions">
        <div class="tab-nav">
          <button class="univ-btn active" id="btn-n50" onclick="switchUniverse('nifty50')">Nifty 50</button>
          <button class="univ-btn" id="btn-n500" onclick="switchUniverse('nifty500')">Nifty 500</button>
        </div>
      </div>
    </header>

    <!-- NAVIGATION -->
    <nav class="tab-nav animate-in" style="animation-delay: 0.1s">
      <button class="tab-btn active" onclick="switchTab('overview')">Overview</button>
      <button class="tab-btn" onclick="switchTab('heatmap')">PnL Heatmap</button>
      <button class="tab-btn" onclick="switchTab('layers')">Layer Metrics</button>
      <button class="tab-btn" onclick="switchTab('equity')">Equity Growth</button>
    </nav>

    <!-- TAB: OVERVIEW -->
    <section id="tab-overview" class="tab-pane active">
      <div class="kpi-grid" id="kpi-row"></div>
      
      <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 1.5rem;">
        <div class="glass" style="padding: 1.5rem;">
          <h3 class="kpi-label" style="margin-bottom: 1.5rem;">Institutional Equity Curves</h3>
          <div style="height: 400px;">
            <canvas id="equityOverview"></canvas>
          </div>
        </div>
        <div class="glass" style="padding: 1.5rem;">
          <h3 class="kpi-label" style="margin-bottom: 1.5rem;">Market Exposure (Beta)</h3>
          <div style="height: 400px;">
            <canvas id="betaChart"></canvas>
          </div>
        </div>
      </div>
    </section>

    <!-- TAB: HEATMAP -->
    <section id="tab-heatmap" class="tab-pane">
      <div class="glass" style="padding: 2rem;">
        <h3 class="kpi-label" style="margin-bottom: 2rem;">Monthly Performance Heatmap (ULTRA Defense)</h3>
        <div id="heatmap-container"></div>
      </div>
    </section>

    <!-- TAB: LAYERS -->
    <section id="tab-layers" class="tab-pane">
      <div class="glass" style="padding: 1.5rem;">
        <h3 class="kpi-label" style="margin-bottom: 1.5rem;">Strategy Layer Comparison</h3>
        <div style="overflow-x: auto;">
          <table class="data-table">
            <thead>
              <tr>
                <th>Layer</th>
                <th>CAGR</th>
                <th>Sharpe</th>
                <th>Sortino</th>
                <th>Max DD</th>
                <th>Total Return</th>
              </tr>
            </thead>
            <tbody id="layerTableBody"></tbody>
          </table>
        </div>
      </div>
    </section>

  </main>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/countup.js@2.8.0/dist/countUp.umd.js"></script>
  <script src="data.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
